name: Lint
on:
  pull_request:
    branches: [main, master]
jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx eslint '*/**/*.{js,ts,tsx}'
